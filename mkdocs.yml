site_name: LLM Foundations
site_description: A companion micro-site to the LLM Understanding Lesson Plan — covering LLM clients, models, vision-language models, and inference providers.
site_url: https://electblake-engineering.github.io/llm-foundations/
repo_url: https://github.com/electblake-engineering/llm-foundations
repo_name: electblake-engineering/llm-foundations

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_javascript:
  - https://unpkg.com/mermaid@11/dist/mermaid.min.js

nav:
  - Home: index.md
  - Course:
    - "1. LLM Understanding":
      - Overview: llm-understanding/index.md
    - "2. LLM Clients":
      - Overview: llm-clients/index.md
    - "3. LLM Models":
      - Overview: llm-models/index.md
    - "4. Vision-Language Models (VLM)":
      - Overview: vlm/index.md
    - "5. Inference Providers":
      - Overview: inference-providers/index.md
